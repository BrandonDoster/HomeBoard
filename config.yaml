---
name: HomeBoard
version: "1.0.0"
slug: homeboard
description: Household Kanban board with tasks, due dates, and team assignments.
url: https://github.com/BrandonDoster/homeboard-addon
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

# Ingress serves the web UI through HA's reverse proxy — no port mapping needed.
# The sidebar entry and "Open Web UI" button are enabled automatically.
ingress: true
ingress_port: 8000
ingress_stream: false
panel_icon: mdi:clipboard-check-outline
panel_title: HomeBoard

# /data is the HA Supervisor's persistent storage location for this add-on.
# It survives add-on updates and reinstalls. The SQLite file lives here.
map:
  - data

# Options exposed in the add-on configuration panel in HA.
# Currently none are required — the add-on works out of the box.
options: {}
schema: {}

# The add-on does not need host network or privileged access.
host_network: false
privileged: []

# Startup order — 'application' means after HA core has started.
startup: application
boot: auto

# HA watchdog will restart the add-on if it crashes.
watchdog: http://[HOST]:[PORT:8000]/api/ha/summary
