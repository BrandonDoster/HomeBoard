---
name: HomeBoard
version: "1.0.0"
slug: homeboard
description: Household Kanban board with tasks, due dates, and team assignments.
url: https://github.com/BrandonDoster/HomeBoard
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

# init: false tells the Supervisor we are not using S6 process supervision.
# Our CMD in the Dockerfile is the only process — no supervisor wrapper needed.
init: false

# Ingress serves the web UI through HA's reverse proxy.
# Gives us the sidebar entry and "Open Web UI" button automatically.
# No port mapping or firewall rules needed — works on LAN and remote alike.
ingress: true
ingress_port: 8000
panel_icon: mdi:clipboard-check-outline
panel_title: HomeBoard

# /data is mounted by the Supervisor as persistent storage for this add-on.
# Survives updates, reinstalls, and HA restarts.
map:
  - data

# No user-facing configuration options needed — works out of the box.
options: {}
schema: {}

# No host network or privileged access required.
host_network: false
privileged: []

startup: application
boot: auto

# Watchdog polls this lightweight endpoint — restarts the add-on if it goes silent.
watchdog: http://[HOST]:[PORT:8000]/api/ha/summary
